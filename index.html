<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="/static/offline.js" defer></script>
    <style>
        /* Custom color scheme */
        :root {
            --pico-primary: #667eea;
            --pico-primary-hover: #764ba2;
        }

        .success-message, .failure-message {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: var(--pico-border-radius);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .failure-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Form row for side-by-side inputs */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        /* Recommendations table */
        #recommendation-results button {
            padding: 0.25rem 0.5rem;
            margin: 0;
        }

        /* Previous Workouts table */
        #previous-workouts:has(tbody:empty) table {
            display: none;
        }
        #previous-workouts:has(tbody:empty) {
            text-align: center;
            color: var(--pico-muted-color);
        }
        #previous-workouts:has(tbody:empty)::after {
            content: "No workouts logged yet. Start by adding your first workout!";
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--pico-muted-color);
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .pagination {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .pagination .pagination-next {
            justify-self: end;
        }
        .pagination button {
            width: 8rem;
        }

        #offline-banner {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.9rem;
            border-bottom: 1px solid #ffc107;
        }
    </style>
</head>
<body>
    <div id="offline-banner" hidden>You are offline. Showing cached data.</div>
    <main class="container">
        <h1>Workout Tracker</h1>

        <!-- Weight Recommendation -->
        <article>
            <header>
                <h2>Weight Recommendation</h2>
            </header>
            
            <form id="recommendation-form" method="post">
                <div class="form-row">
                    <label>
                        Exercise
                        <select name="exercise_name" required
                                hx-get="/exercises"
                                hx-trigger="load, exercise-created from:body"
                                hx-target="this"
                                hx-swap="innerHTML">
                            <option value="">Loading exercises...</option>
                        </select>
                    </label>
                    <label>
                        Reps
                        <input type="number" name="reps" required min="1" placeholder="e.g., 10">
                    </label>
                    <label>
                        RPE
                        <input type="number" name="rpe" required min="1" max="10" step="0.5" placeholder="1-10">
                    </label>
                </div>
                <button type="submit"
                        hx-post="/recommendations"
                        hx-include="#recommendation-form"
                        hx-target="#recommendation-results"
                        hx-swap="innerHTML">
                    Get Recommendation
                </button>
            </form>

            <div id="recommendation-results">
                <!-- Recommendations will appear here -->
            </div>
        </article>
        
        <!-- Create Workout Form -->
        <article id="workout-form">
            <header>
                <h2>Log Workout</h2>
            </header>
            <div id="success-message"></div>
            <form hx-post="/workouts/" 
                  hx-swap="none"
                  hx-on::after-request="if(event.detail.successful && event.detail.xhr.responseURL.includes('/workouts/')) { this.reset(); document.getElementById('success-message').innerHTML = '<div class=\'success-message\'>✅ Workout logged successfully!</div>'; setTimeout(() => document.getElementById('success-message').innerHTML = '', 3000); }">
                
                <div class="form-row">
                    <label>
                        Exercise
                        <select id="exercise_name" name="exercise_name" required 
                                hx-get="/exercises" 
                                hx-trigger="load, exercise-created from:body"
                                hx-swap="innerHTML">
                            <option value="">Loading exercises...</option>
                        </select>
                    </label>
                    <label>
                        Reps
                        <input type="number" id="reps" name="reps" required min="1" placeholder="e.g., 10">
                    </label>
                </div>

                <div class="form-row">
                    <label>
                        Weight (kg)
                        <input type="number" id="weight" name="weight" required min="0" step="0.25" placeholder="e.g., 50">
                    </label>
                    <label>
                        RPE
                        <input type="number" id="rpe" name="rpe" required min="1" max="10" step="0.5" placeholder="1-10">
                    </label>
                </div>

                <button type="submit">Log Workout</button>
            </form>
        </article>

        <!-- Previous Workouts -->
        <article>
            <header>
                <h2>Previous Workouts</h2>
            </header>
            <div id="previous-workouts" 
                 hx-get="/workouts" 
                 hx-trigger="load"
                 hx-swap="outerHTML">
                <div class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <p>Loading workouts...</p>
                </div>
            </div>
        </article>

        <!-- Update Bodyweight -->
        <article>
            <header>
                <h2>Update Bodyweight</h2>
            </header>
            <form hx-put="/bodyweight" 
                  hx-target="#bodyweight-display" 
                  hx-swap="outerHTML">
                  <div class="form-row"></div>
                    <label>
                        Bodyweight (kg)
                        <input type="number" id="bodyweight" name="bodyweight" required min="40" max="150" step="0.1" placeholder="e.g., 75">
                    </label>
                    <div style="display: flex; align-items: end;">
                        <button type="submit">Update</button>
                    </div>
                </div>
            </form>
            <div hx-get="/bodyweight"
                 hx-trigger="load"
                 hx-swap="outerHTML">
                 <p style="font-size: 0.9rem; color: var(--pico-muted-color);">
                    Loading...
                 </p>
            </div>
        </article>

        <!-- Create Exercise -->
        <article>
            <header>
                <h2>Create Exercise</h2>
            </header>
            <form hx-post="/exercises"
                  hx-target="#create-exercise-result"
                  hx-swap="innerHTML"
                  hx-on:exercise-created="this.reset(); setTimeout(() => document.getElementById('create-exercise-result').innerHTML = '', 3000);">

                <div class="form-row">
                    <label>
                        Name
                        <input type="text" id="name" name="name" required placeholder="e.g., Pull-up">
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="dip_belt" name="dip_belt" style="margin: 0;">
                        Dip belt
                    </label>
                </div>
                <button type="submit">Create</button>
            </form>
            <div id="create-exercise-result"></div>
        </article>
    </main>
</body>
</html>
