<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/offline.js" defer></script>
    <style>
        /* Custom color scheme */
        :root {
            --pico-primary: #667eea;
            --pico-primary-hover: #764ba2;
        }

        .success-message, .failure-message {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: var(--pico-border-radius);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .failure-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Form row for side-by-side inputs */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        /* Recommendations table */
        #recommendation-results button {
            padding: 0.25rem 0.5rem;
            margin: 0;
        }

        /* Previous Exercises table */
        #previous-exercises:has(tbody:empty) table {
            display: none;
        }
        #previous-exercises:has(tbody:empty) {
            text-align: center;
            color: var(--pico-muted-color);
        }
        #previous-exercises:has(tbody:empty)::after {
            content: "No exercises logged yet. Start by adding your first exercise!";
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--pico-muted-color);
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            margin: 0;
            font-size: 0.9rem;
            width: auto;
        }
        .delete-btn:hover {
            color: #dc3545;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--pico-muted-color);
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .pagination {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .pagination .pagination-next {
            justify-self: end;
        }
        .pagination button {
            width: 8rem;
        }

        #offline-banner {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.9rem;
            border-bottom: 1px solid #ffc107;
        }
    </style>
</head>
<body>
    <div id="offline-banner" hidden>You are offline. Showing cached data.</div>
    <main class="container">
        <h1>Workout Tracker</h1>

        <!-- Weight Recommendation -->
        <article>
            <header>
                <h2>Weight Recommendation</h2>
            </header>

            <form id="recommendation-form" method="post">
                <div class="form-row">
                    <label>
                        Movement
                        <select name="exercise_name" required
                                hx-get="/movements"
                                hx-trigger="load, movement-created from:body"
                                hx-target="this"
                                hx-swap="innerHTML">
                            <option value="">Loading movements...</option>
                        </select>
                    </label>
                    <label>
                        Reps
                        <input type="number" name="reps" required min="1" max="20" placeholder="e.g., 10">
                    </label>
                    <label>
                        RPE
                        <input type="number" name="rpe" required min="6" max="10" step="0.5" placeholder="6-10">
                    </label>
                </div>
                <button type="submit"
                        hx-post="/recommendations"
                        hx-include="#recommendation-form"
                        hx-target="#recommendation-results"
                        hx-swap="innerHTML">
                    Get Recommendation
                </button>
            </form>

            <div id="recommendation-results" style="overflow-x: auto">
                <!-- Recommendations will appear here -->
            </div>
        </article>

        <!-- Log Exercise Form -->
        <article id="exercise-form">
            <header>
                <h2>Log Exercise</h2>
            </header>
            <div id="success-message"></div>
            <form hx-post="/exercises/"
                  hx-swap="none"
                  hx-on::after-request="if(event.detail.successful && event.detail.xhr.responseURL.includes('/exercises/')) { this.reset(); document.getElementById('exercise_date').valueAsDate = new Date(); document.getElementById('sets').value = 3; document.getElementById('success-message').innerHTML = '<div class=\'success-message\'>Exercise logged successfully!</div>'; setTimeout(() => document.getElementById('success-message').innerHTML = '', 3000); document.body.dispatchEvent(new Event('exercise-logged')); }">

                <div class="form-row">
                    <label>
                        Date
                        <input type="date" id="exercise_date" name="exercise_date">
                    </label>
                    <label>
                        Movement
                        <select id="exercise_name" name="exercise_name" required
                                hx-get="/movements"
                                hx-trigger="load, movement-created from:body"
                                hx-swap="innerHTML">
                            <option value="">Loading movements...</option>
                        </select>
                    </label>
                </div>

                <div class="form-row">
                    <label>
                        Sets
                        <input type="number" id="sets" name="sets" required min="1" max="10" value="3">
                    </label>
                    <label>
                        Reps
                        <input type="number" id="reps" name="reps" required min="1" max="20" placeholder="e.g., 10">
                    </label>
                    <label>
                        Weight (kg)
                        <input type="number" id="weight" name="weight" required min="0" step="0.25" placeholder="e.g., 50">
                    </label>
                    <label>
                        RPE
                        <input type="number" id="rpe" name="rpe" required min="6" max="10" step="0.5" placeholder="6-10">
                    </label>
                </div>

                <button type="submit">Log Exercise</button>
            </form>
        </article>

        <!-- Previous Exercises -->
        <article>
            <header>
                <h2>Previous Exercises</h2>
            </header>
            <div id="previous-exercises"
                 hx-get="/exercises"
                 hx-trigger="load, exercise-logged from:body"
                 hx-swap="outerHTML">
                <div class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <p>Loading exercises...</p>
                </div>
            </div>
        </article>

        <!-- Update Bodyweight -->
        <article>
            <header>
                <h2>Update Bodyweight</h2>
            </header>
            <form hx-put="/bodyweight"
                  hx-target="#bodyweight-display"
                  hx-swap="outerHTML">
                  <div class="form-row"></div>
                    <label>
                        Bodyweight (kg)
                        <input type="number" id="bodyweight" name="bodyweight" required min="40" max="150" step="0.1" placeholder="e.g., 75">
                    </label>
                    <div style="display: flex; align-items: end;">
                        <button type="submit">Update</button>
                    </div>
                </div>
            </form>
            <div hx-get="/bodyweight"
                 hx-trigger="load"
                 hx-swap="outerHTML">
                 <p style="font-size: 0.9rem; color: var(--pico-muted-color);">
                    Loading...
                 </p>
            </div>
        </article>

        <!-- See Progress -->
        <article>
            <header>
                <h2>Progress</h2>
            </header>
            <div class="form-row">
                <label>
                    Movement
                    <select id="progress-exercise"
                        hx-get="/movements"
                        hx-trigger="load, movement-created from:body"
                        hx-swap="innerHTML">
                        <option value="">Loading movements...</option>
                    </select>
                </label>
                <label>
                    Time Period
                    <select id="progress-period">
                        <option value="30">1 Month</option>
                        <option value="180" selected>6 Months</option>
                        <option value="365">1 Year</option>
                    </select>
                </label>
            </div>
            <button onclick="loadProgress()">Show Progress</button>
            <div id="progress-no-data" class="failure-message" hidden>No data for this movement in the selected period.</div>
            <canvas id="progress-chart" hidden></canvas>
        </article>

        <!-- Create Movement -->
        <article>
            <header>
                <h2>Create Movement</h2>
            </header>
            <form hx-post="/movements"
                  hx-target="#create-movement-result"
                  hx-swap="innerHTML"
                  hx-on:movement-created="this.reset(); setTimeout(() => document.getElementById('create-movement-result').innerHTML = '', 3000);">

                <div class="form-row">
                    <label>
                        Name
                        <input type="text" id="name" name="name" required placeholder="e.g., Pull-up">
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="dip_belt" name="dip_belt" style="margin: 0;">
                        Dip belt
                    </label>
                </div>
                <button type="submit">Create</button>
            </form>
            <div id="create-movement-result"></div>
        </article>
    </main>

    <script>
        document.getElementById('exercise_date').valueAsDate = new Date();
    </script>

    <!-- JS script for handling the progress chart -->
    <script>
        let progressChart = null;

        async function loadProgress() {
            const exercise = document.getElementById('progress-exercise').value;
            const days = document.getElementById('progress-period').value;

            if (!exercise) return;

            const response = await fetch(`/progress?exercise_name=${encodeURIComponent(exercise)}&days=${days}`);
            if (!response.ok) return;
            const data = await response.json();

            // Formats the date as "12 Apr" if the date is on the current year, and as "12 Apr 2020" otherwise.
            function formatDate(isoString) {
                const date = new Date(isoString);
                const day = date.getDate();
                const month = date.toLocaleString('en', { month: 'short' });
                const year = date.getFullYear();

                if (year === new Date().getFullYear()) {
                    return `${day} ${month}`;
                }
                return `${day} ${month} ${year}`;
            }
            const labels = data.onerepmax.map(d => formatDate(d.date));
            const values = data.onerepmax.map(d => d.value);

            const canvas = document.getElementById('progress-chart');
            const noData = document.getElementById('progress-no-data');

            if (progressChart) {
                progressChart.destroy();
                progressChart = null;
            }

            if (values.length === 0) {
                canvas.hidden = true;
                noData.hidden = false;
                return;
            }

            noData.hidden = true;
            canvas.hidden = false;

            progressChart = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${data.exercise} Estimated 1RM (kg)`,
                        data: values,
                        borderColor: '#667eea',
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
